{% set version = "2.3.0" %}

package:
  name: prov
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/prov/prov-{{ version }}.tar.gz
  sha256: 841d3a953af65d27266959eeefeff09b24b7ca8d10b090420537014b0da892bb

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - networkx >=2.0
    - lxml >=3.3.5
    - six >=1.9.0
    - rdflib >=6.0.0,<8
    - pydot >=1.2.0

  run:
    - python >={{ python_min }}
    - python-dateutil >=2.2
    - networkx >=2.0
    - lxml >=3.3.5
    - six >=1.9.0
    - rdflib >=6.0.0,<8
    - pydot >=1.2.0

test:
  # Python imports
  requires:
    - python {{ python_min }}
  imports:
    - prov
    - prov.serializers
    - prov.tests

about:
  home: https://github.com/trungdong/prov
  license: MIT
  license_file: LICENSE
  summary: A library for W3C Provenance Data Model supporting PROV-JSON and PROV-XML

extra:
  recipe-maintainers:
    - satra
    - trungdong
