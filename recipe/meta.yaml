{% set version = "2.4.0" %}

package:
  name: prov
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/prov/prov-{{ version }}.tar.gz
  sha256: b6ac0c7cfabd268b2689a406e62c4dc5eaa6895ca877565fc73ab008f4e3eb7e

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - python-dateutil >=2.2
    - networkx >=2.0
    - lxml >=3.3.5
    - six >=1.9.0
    - rdflib >=4.2.2
    - pydot >=1.2.0

  run:
    - python >={{ python_min }}
    - python-dateutil >=2.2
    - networkx >=2.0
    - lxml >=3.3.5
    - six >=1.9.0
    - rdflib >=4.2.2
    - pydot >=1.2.0

test:
  # Python imports
  requires:
    - python {{ python_min }}
  imports:
    - prov
    - prov.serializers
    - prov.tests

about:
  home: https://github.com/trungdong/prov
  license: MIT
  license_file: LICENSE
  summary: A library for W3C Provenance Data Model supporting PROV-JSON and PROV-XML

extra:
  recipe-maintainers:
    - satra
    - trungdong
